<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Japan & Body Sushi — Fragua47</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Metamorphous&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1360px;
      height: 1600px;
      overflow: hidden;
    }

    .flyer {
      width: 1360px;
      height: 1600px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 90px 160px 80px;
      background:
        radial-gradient(ellipse at 50% 42%, rgba(90, 32, 6, 0.55) 0%, transparent 62%),
        radial-gradient(ellipse at 50% 100%, rgba(60, 18, 2, 0.4) 0%, transparent 50%),
        #0c0804;
    }

    /* ── GRAIN TEXTURE ── */
    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      opacity: 0.055;
      background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='256' height='256'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/></filter><rect width='256' height='256' filter='url(%23n)'/></svg>");
      background-repeat: repeat;
    }

    /* ── CORNER BRACKETS ── */
    .c { position: fixed; width: 56px; height: 56px; z-index: 20; }
    .c-tl { top: 32px; left: 32px; border-top: 1px solid rgba(220,140,60,0.5); border-left: 1px solid rgba(220,140,60,0.5); }
    .c-tr { top: 32px; right: 32px; border-top: 1px solid rgba(220,140,60,0.5); border-right: 1px solid rgba(220,140,60,0.5); }
    .c-bl { bottom: 32px; left: 32px; border-bottom: 1px solid rgba(220,140,60,0.5); border-left: 1px solid rgba(220,140,60,0.5); }
    .c-br { bottom: 32px; right: 32px; border-bottom: 1px solid rgba(220,140,60,0.5); border-right: 1px solid rgba(220,140,60,0.5); }

    /* ── COPPER TEXT ── */
    .copper {
      background: linear-gradient(to bottom, #ffe0b0 0%, #f0a060 18%, #e08040 42%, #c86020 68%, #8c3810 88%, #5a2008 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: brightness(1.3);
    }

    /* ── TOP: LOGO ── */
    .top {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      position: relative;
      z-index: 5;
    }

    .logo-wrap img {
      height: 180px;
      width: auto;
      filter: sepia(1) saturate(2.5) brightness(0.85) hue-rotate(-8deg);
      opacity: 0.92;
    }

    .pretitle {
      font-family: 'Cinzel', serif;
      font-size: 20px;
      font-weight: 400;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: rgba(200,120,40,0.55);
    }

    /* ── MID: HEADLINE ── */
    .mid {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 20px;
      position: relative;
      z-index: 5;
      flex: 1;
      justify-content: center;
    }

    .title {
      font-family: 'Cinzel', serif;
      font-size: 108px;
      font-weight: 700;
      line-height: 0.95;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .amp {
      font-family: 'Cinzel', serif;
      font-size: 60px;
      font-weight: 400;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: rgba(200,120,40,0.5);
      display: block;
      margin: 6px 0;
    }

    .sep {
      width: 180px;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(220,140,60,0.45), transparent);
    }

    .tagline {
      font-family: 'Cinzel', serif;
      font-size: 26px;
      font-weight: 400;
      font-style: italic;
      letter-spacing: 2px;
      color: rgba(255,220,160,0.45);
      line-height: 1.7;
    }

    /* ── DATE BLOCK ── */
    .date-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      position: relative;
      z-index: 5;
    }

    .date-line {
      font-family: 'Cinzel', serif;
      font-size: 36px;
      font-weight: 600;
      letter-spacing: 6px;
      text-transform: uppercase;
    }

    .date-sub {
      font-family: 'Cinzel', serif;
      font-size: 18px;
      font-weight: 400;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: rgba(200,120,40,0.5);
    }

    /* ── BOTTOM: CTA ── */
    .bottom {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      position: relative;
      z-index: 5;
    }

    .price {
      font-family: 'Cinzel', serif;
      font-size: 100px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: 2px;
    }

    .price-sub {
      font-family: 'Cinzel', serif;
      font-size: 20px;
      font-weight: 400;
      letter-spacing: 7px;
      text-transform: uppercase;
      color: rgba(200,120,40,0.5);
      margin-top: -12px;
    }

    .web {
      font-family: 'Cinzel', serif;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(220,140,60,0.65);
    }
  </style>
</head>
<body>
<div class="flyer">
  <div class="grain"></div>

  <div class="c c-tl"></div>
  <div class="c c-tr"></div>
  <div class="c c-bl"></div>
  <div class="c c-br"></div>

  <!-- LOGO -->
  <div class="top">
    <div class="logo-wrap">
      <img src="VectLogoF47.webp" alt="Fragua47">
    </div>
    <div class="pretitle">— Valladolid —</div>
  </div>

  <!-- HEADLINE -->
  <div class="mid">
    <div class="title copper">Japan<span class="amp">&amp;</span>Body Sushi</div>
    <div class="sep"></div>
    <div class="tagline">Una velada donde los sentidos<br>mandan. El placer, cuando se<br>comparte, se multiplica.</div>
  </div>

  <!-- FECHA -->
  <div class="date-block">
    <div class="date-line copper">18 de Abril</div>
    <div class="date-sub">Viernes · 21:00 h · Valladolid</div>
  </div>

  <!-- CTA -->
  <div class="bottom">
    <div class="price copper">28€</div>
    <div class="price-sub">por persona</div>
    <div class="web">fragua47.com</div>
  </div>

</div>
</body>
</html>
