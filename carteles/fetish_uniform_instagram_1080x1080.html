<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Fetish Uniform Night — Fragua47</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Metamorphous&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
    }

    .flyer {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      background: #1e1008;
    }

    /* ── DOUBLE BORDER ── */
    .b1 {
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(210, 120, 40, 0.7);
      pointer-events: none;
      z-index: 50;
    }

    .b2 {
      position: absolute;
      inset: 16px;
      border: 1px solid rgba(210, 120, 40, 0.7);
      pointer-events: none;
      z-index: 50;
    }

    /* ── FOTO FONDO — dentro de los bordes ── */
    .bg-wrap {
      position: absolute;
      inset: 17px;
      overflow: hidden;
    }

    .bg-photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 55%;
      display: block;
    }

    /* ── GRADIENTE OSCURO ── */
    .overlay {
      position: absolute;
      inset: 17px;
      background:
        linear-gradient(to bottom,
          rgba(18, 8, 2, 0.25) 0%,
          rgba(18, 8, 2, 0.15) 25%,
          rgba(18, 8, 2, 0.50) 52%,
          rgba(18, 8, 2, 0.85) 70%,
          rgba(18, 8, 2, 0.97) 83%,
          #120802 100%
        ),
        linear-gradient(to bottom,
          transparent 0%,
          rgba(180, 70, 10, 0.15) 65%,
          rgba(180, 70, 10, 0.25) 100%
        );
    }

    /* ── CONTENIDO ── */
    .content {
      position: absolute;
      inset: 17px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      text-align: center;
      padding: 32px 80px 36px;
      z-index: 10;
    }

    /* ── LOGO ── */
    .logo-brand {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .logo-brand .logo-img {
      height: 52px;
      width: auto;
    }

    .logo-metalico {
      font-family: 'Metamorphous', cursive;
      font-size: 38px;
      font-weight: 400;
      letter-spacing: 3px;
      background: linear-gradient(to bottom, #ffe0b0 0%, #f0a060 15%, #e08040 40%, #d07030 65%, #a04018 85%, #6a2808 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: brightness(1.6);
      text-shadow: 1px 1px 0 #5a2006, 2px 2px 0 #3d1404, 3px 3px 8px rgba(0,0,0,0.9);
    }

    .spacer { flex: 1; }

    /* ── BOTTOM ── */
    .bottom {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      flex-shrink: 0;
      width: 100%;
    }

    .title {
      font-family: 'Metamorphous', cursive;
      font-size: 62px;
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #f0d898;
    }

    .title .accent { color: #e0b080; }

    .sep {
      width: 80%;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(210, 120, 40, 0.6), transparent);
      margin: 16px 0;
    }

    .date-block {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    .date-day {
      font-family: 'Metamorphous', cursive;
      font-size: 80px;
      font-weight: 400;
      line-height: 1;
      color: #f0d898;
    }

    .date-divider {
      width: 1px;
      height: 58px;
      background: rgba(240, 216, 152, 0.25);
    }

    .date-details {
      display: flex;
      flex-direction: column;
      gap: 6px;
      text-align: left;
    }

    .date-month {
      font-family: 'Cinzel', serif;
      font-size: 30px;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #f0d898;
    }

    .date-time {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(240, 216, 152, 0.7);
    }

    .sep2 {
      width: 60%;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(210, 120, 40, 0.4), transparent);
      margin: 16px 0 14px;
    }

    .footer-info {
      width: 100%;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }

    .price-line {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .price-amount {
      font-family: 'Metamorphous', cursive;
      font-size: 56px;
      color: #f0d898;
      line-height: 1;
    }

    .price-pp {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      color: rgba(240, 216, 152, 0.8);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .footer-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 5px;
    }

    .web-line {
      font-family: 'Cinzel', serif;
      font-size: 17px;
      font-weight: 600;
      color: rgba(240, 216, 152, 0.95);
      letter-spacing: 0.05em;
    }

    .contact-line {
      font-family: 'Cinzel', serif;
      font-size: 14px;
      color: rgba(240, 216, 152, 0.8);
      letter-spacing: 0.05em;
    }

    .contact-line .handle {
      color: #f0d898;
      font-weight: 600;
    }

    /* ── EMBERS ── */
    .embers-overlay {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: 220px;
      height: 300px;
      mix-blend-mode: screen;
      opacity: 0.55;
      pointer-events: none;
      z-index: 60;
    }
  </style>
</head>
<body>
<div class="flyer">
  <div class="bg-wrap">
    <img class="bg-photo" src="v2vertical.png" alt="">
  </div>
  <div class="overlay"></div>
  <div class="b1"></div>
  <div class="b2"></div>

  <div class="content">
    <div class="logo-brand">
      <img src="../public/VectLogoF47.png" alt="Fragua47" class="logo-img">
      <h1 class="logo-metalico">FRAGUA47</h1>
    </div>

    <div class="spacer"></div>

    <div class="bottom">
      <div class="title">Fetish Uniform <span class="accent">Night</span></div>
      <div class="sep"></div>
      <div class="date-block">
        <div class="date-day">2</div>
        <div class="date-divider"></div>
        <div class="date-details">
          <div class="date-month">Mayo</div>
          <div class="date-time">Sábado · 21:00 h · Valladolid</div>
        </div>
      </div>
      <div class="sep2"></div>
      <div class="footer-info">
        <div class="price-line">
          <div class="price-amount">25€</div>
          <div class="price-pp">por persona</div>
        </div>
        <div class="footer-right">
          <div class="web-line">fragua47.org</div>
          <div class="contact-line">FetLife <span class="handle">Fragua47</span></div>
        </div>
      </div>
    </div>
  </div>

  <img class="embers-overlay" src="embers-nobg.png" alt="">
</div>
</body>
</html>
