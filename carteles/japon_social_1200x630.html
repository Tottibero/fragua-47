<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Japan & Body Sushi — Fragua47</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Metamorphous&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
    }

    .flyer {
      width: 1200px;
      height: 630px;
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-columns: 520px 1fr;
    }

    /* ── GRAIN TEXTURE ── */
    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      opacity: 0.055;
      background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='256' height='256'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/></filter><rect width='256' height='256' filter='url(%23n)'/></svg>");
      background-repeat: repeat;
    }

    /* ── CORNER BRACKETS ── */
    .c { position: fixed; width: 24px; height: 24px; z-index: 20; }
    .c-tl { top: 10px; left: 10px; border-top: 1px solid rgba(220,140,60,0.5); border-left: 1px solid rgba(220,140,60,0.5); }
    .c-tr { top: 10px; right: 10px; border-top: 1px solid rgba(220,140,60,0.5); border-right: 1px solid rgba(220,140,60,0.5); }
    .c-bl { bottom: 10px; left: 10px; border-bottom: 1px solid rgba(220,140,60,0.5); border-left: 1px solid rgba(220,140,60,0.5); }
    .c-br { bottom: 10px; right: 10px; border-bottom: 1px solid rgba(220,140,60,0.5); border-right: 1px solid rgba(220,140,60,0.5); }

    /* ── COPPER TEXT ── */
    .copper {
      background: linear-gradient(to bottom, #ffe0b0 0%, #f0a060 18%, #e08040 42%, #c86020 68%, #8c3810 88%, #5a2008 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: brightness(1.3);
    }

    /* ── LEFT PHOTO ── */
    .left {
      width: 520px;
      height: 630px;
      overflow: hidden;
      position: relative;
    }

    .left img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
      filter: brightness(0.55) sepia(0.3) saturate(0.8);
    }

    .left::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to right, rgba(12,8,4,0.2) 0%, rgba(12,8,4,0.85) 100%),
        linear-gradient(to bottom, rgba(12,8,4,0.4) 0%, transparent 25%),
        linear-gradient(to top, rgba(12,8,4,0.4) 0%, transparent 25%);
    }

    /* ── RIGHT CONTENT ── */
    .right {
      height: 630px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      text-align: center;
      padding: 34px 46px 30px;
      background:
        radial-gradient(ellipse at 50% 45%, rgba(90, 32, 6, 0.5) 0%, transparent 65%),
        #0c0804;
    }

    /* ── TOP ── */
    .top {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .logo-wrap img {
      height: 46px;
      width: auto;
      filter: sepia(1) saturate(2.5) brightness(0.85) hue-rotate(-8deg);
      opacity: 0.92;
    }

    .pretitle {
      font-family: 'Cinzel', serif;
      font-size: 8px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: rgba(200,120,40,0.5);
    }

    /* ── MID ── */
    .mid {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 9px;
      flex: 1;
      justify-content: center;
    }

    .title {
      font-family: 'Cinzel', serif;
      font-size: 54px;
      font-weight: 700;
      line-height: 0.95;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .amp {
      font-family: 'Cinzel', serif;
      font-size: 24px;
      font-weight: 400;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: rgba(200,120,40,0.45);
      display: block;
      margin: 2px 0;
    }

    .sep {
      width: 100px;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(220,140,60,0.4), transparent);
    }

    .tagline {
      font-family: 'Cinzel', serif;
      font-size: 11.5px;
      font-weight: 400;
      font-style: italic;
      letter-spacing: 1px;
      color: rgba(255,220,160,0.4);
      line-height: 1.7;
    }

    /* ── DATE ── */
    .date-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .date-line {
      font-family: 'Cinzel', serif;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 5px;
      text-transform: uppercase;
    }

    .date-sub {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(200,120,40,0.45);
    }

    /* ── BOTTOM ── */
    .bottom {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .price {
      font-family: 'Cinzel', serif;
      font-size: 52px;
      font-weight: 700;
      line-height: 1;
    }

    .price-sub {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: rgba(200,120,40,0.45);
    }

    .web {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(220,140,60,0.6);
      margin-top: 4px;
    }
  </style>
</head>
<body>
<div class="flyer">
  <div class="grain"></div>

  <div class="c c-tl"></div>
  <div class="c c-tr"></div>
  <div class="c c-bl"></div>
  <div class="c c-br"></div>

  <!-- LEFT: Foto -->
  <div class="left">
    <img src="Bodysushi.webp" alt="Japan & Body Sushi">
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="top">
      <div class="logo-wrap"><img src="VectLogoF47.webp" alt="Fragua47"></div>
      <div class="pretitle">— Valladolid —</div>
    </div>

    <div class="mid">
      <div class="title copper">Japan<span class="amp">&amp;</span>Body Sushi</div>
      <div class="sep"></div>
      <div class="tagline">Una velada donde los sentidos mandan.<br>El placer, compartido, se multiplica.</div>
    </div>

    <div class="date-block">
      <div class="date-line copper">18 de Abril</div>
      <div class="date-sub">Viernes · 21:00 h · Valladolid</div>
    </div>

    <div class="bottom">
      <div class="price copper">28€</div>
      <div class="price-sub">por persona</div>
      <div class="web">fragua47.com</div>
    </div>
  </div>

</div>
</body>
</html>
