<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Code Night — Tu Pecado Capital</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1360px;
      height: 1600px;
      overflow: hidden;
      background: #0a0c0b;
    }

    .flyer {
      width: 1360px;
      height: 1600px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #0a0c0b;
    }

    /* ── CORNER BRACKETS ── */
    .c { position: fixed; width: 56px; height: 56px; z-index: 999; }
    .c-tl { top: 32px; left: 32px; border-top: 2px solid rgba(201,168,76,0.9); border-left: 2px solid rgba(201,168,76,0.9); }
    .c-tr { top: 32px; right: 32px; border-top: 2px solid rgba(201,168,76,0.9); border-right: 2px solid rgba(201,168,76,0.9); }
    .c-bl { bottom: 32px; left: 32px; border-bottom: 2px solid rgba(201,168,76,0.9); border-left: 2px solid rgba(201,168,76,0.9); }
    .c-br { bottom: 32px; right: 32px; border-bottom: 2px solid rgba(201,168,76,0.9); border-right: 2px solid rgba(201,168,76,0.9); }


    /* ── TOP BLOCK ── */
    .top-block {
      width: 100%;
      padding: 72px 100px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      flex-shrink: 0;
    }

    .event-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 52px;
      font-weight: 600;
      font-style: italic;
      letter-spacing: 0.22em;
      color: #C9A84C;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 96px;
      font-weight: 700;
      line-height: 0.9;
      color: #f5f0e8;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 28px;
      white-space: nowrap;
    }

    .title .accent { color: #C9A84C; }

    .date-badge {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      border: 1px solid rgba(201,168,76,0.7);
      background: rgba(201,168,76,0.1);
      padding: 10px 36px;
      margin-bottom: 24px;
    }

    .date-dot {
      width: 9px; height: 9px;
      background: #2E8B6E;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .date-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 48px;
      font-weight: 700;
      font-style: italic;
      color: #f5f0e8;
      letter-spacing: 0.08em;
    }

    .sep {
      width: 55%;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(201,168,76,0.4) 50%, transparent);
      flex-shrink: 0;
    }

    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: 40px;
      font-weight: 600;
      font-style: italic;
      color: rgba(245,240,232,0.97);
      letter-spacing: 0.1em;
      margin-top: 22px;
    }

    /* ── PHOTO AREA ── */
    .photo-area {
      flex: 1;
      width: 100%;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }

    .photo-area img.photo {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center center;
      position: relative;
      z-index: 1;
    }

    /* Gradient fade on all 4 sides of the photo area */
    .photo-fade {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 2;
      pointer-events: none;
      background:
        /* top */
        linear-gradient(to bottom, #0a0c0b 0%, transparent 10%),
        /* bottom */
        linear-gradient(to top, #0a0c0b 0%, transparent 8%),
        /* left */
        linear-gradient(to right, #0a0c0b 0%, transparent 8%),
        /* right */
        linear-gradient(to left, #0a0c0b 0%, transparent 8%);
    }

    /* ── TPC BLOCK ── */
    .tpc-block {
      width: 100%;
      padding: 0 0 60px;
      flex-shrink: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .tpc-block img {
      width: 380px;
      height: auto;
    }
  </style>
</head>
<body>
<div class="flyer">

  <div class="c c-tl"></div>
  <div class="c c-tr"></div>
  <div class="c c-bl"></div>
  <div class="c c-br"></div>

  <!-- TOP -->
  <div class="top-block">
    <div class="event-label">Noche de Protocolo</div>
    <div class="title">Code <span class="accent">Night</span></div>
    <div class="date-badge">
      <div class="date-dot"></div>
      <div class="date-text">11 de Abril · 21:00h</div>
      <div class="date-dot"></div>
    </div>
    <div class="sep"></div>
    <div class="tagline">Donde la elegancia nunca pierde el control</div>
  </div>

  <!-- FOTO -->
  <div class="photo-area">
    <img class="photo" src="horizontal.png" alt="">
    <div class="photo-fade"></div>
  </div>

  <!-- TPC -->
  <div class="tpc-block">
    <img src="LabiosYletras-removebg-preview.png" alt="TPC">
  </div>

</div>
</body>
</html>
